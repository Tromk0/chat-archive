<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>对话归档</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f6f8;
            --card: #ffffff;
            --text: #1a1a2e;
            --text2: #6b7280;
            --border: #e5e7eb;
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #10b981;
            --success-light: #d1fae5;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        .header {
            background: var(--card);
            padding: 16px 16px 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .toolbar select, .toolbar input {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: var(--bg);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .toolbar input { min-width: 140px; }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-outline {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-danger {
            background: var(--danger-light);
            color: var(--danger);
        }
        .btn-success {
            background: var(--success-light);
            color: var(--success);
        }
        .container { padding: 12px 16px; }
        .form-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        .form-card h2 {
            font-size: 17px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .form-row {
            margin-bottom: 12px;
        }
        .form-row label {
            display: block;
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            background: var(--bg);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            font-family: inherit;
        }
        .form-row textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.7;
        }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
            border-color: var(--primary);
            background: #fff;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .form-actions .btn { flex: 1; padding: 12px; font-size: 16px; }
        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--card);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text2);
            box-shadow: var(--shadow);
        }
        .record-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
            transition: transform 0.15s;
        }
        .record-card:active { transform: scale(0.995); }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .record-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-A { background: #fce7f3; color: #be185d; }
        .badge-B { background: #dbeafe; color: #1e40af; }
        .badge-C { background: #d1fae5; color: #065f46; }
        .badge-D { background: #fef3c7; color: #92400e; }
        .badge-E { background: #e5e7eb; color: #374151; }
        .badge-F { background: #ede9fe; color: #5b21b6; }
        .record-date {
            font-size: 13px;
            color: var(--text2);
        }
        .record-summary {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.5;
        }
        .record-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .keyword-tag {
            background: var(--primary-light);
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .record-preview {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .record-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .record-actions .btn {
            flex: 1;
            padding: 8px;
            font-size: 14px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .empty-state p { font-size: 15px; }
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card);
            width: 100%;
            max-height: 85vh;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            overflow-y: auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 { font-size: 18px; }
        .modal-close {
            background: var(--bg);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-section {
            margin-bottom: 16px;
        }
        .detail-section label {
            font-size: 13px;
            color: var(--text2);
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .detail-section .value {
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .detail-content {
            background: var(--bg);
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 50vh;
            overflow-y: auto;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(79,70,229,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.92); }
        .hidden { display: none !important; }
        .import-input { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>对话归档</h1>
        <div class="toolbar">
            <select id="filterCategory">
                <option value="">全部分类</option>
                <option value="A">A - 创作</option>
                <option value="B">B - 技术</option>
                <option value="C">C - 学习</option>
                <option value="D">D - 决策</option>
                <option value="E">E - 日常</option>
                <option value="F">F - 混合/其他</option>
            </select>
            <input type="text" id="searchInput" placeholder="搜索关键词或摘要...">
        </div>
    </div>

    <div class="container">
        <!-- 新增表单 -->
        <div class="form-card" id="formCard">
            <h2>✏️ 新建记录</h2>
            <div class="form-row">
                <label>日期</label>
                <input type="date" id="inputDate">
            </div>
            <div class="form-row">
                <label>分类</label>
                <select id="inputCategory">
                    <option value="">请选择分类</option>
                    <option value="A">A - 创作（写小说、编故事、磨文案）</option>
                    <option value="B">B - 技术（写代码、配工具、理架构）</option>
                    <option value="C">C - 学习（搞懂概念、读论文、练技能）</option>
                    <option value="D">D - 决策（比方案、定计划、排优先级）</option>
                    <option value="E">E - 日常（随便聊聊、发散探索、无明确目标）</option>
                    <option value="F">F - 混合/其他</option>
                </select>
            </div>
            <div class="form-row">
                <label>关键词（用逗号分隔）</label>
                <input type="text" id="inputKeywords" placeholder="例如：React, 性能优化, 前端">
            </div>
            <div class="form-row">
                <label>摘要</label>
                <input type="text" id="inputSummary" placeholder="一句话概括这段对话的核心内容">
            </div>
            <div class="form-row">
                <label>原始对话内容</label>
                <textarea id="inputContent" placeholder="粘贴完整的对话内容..."></textarea>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveRecord()">💾 保存记录</button>
                <button class="btn btn-outline" onclick="clearForm()">🔄 清空</button>
            </div>
        </div>

        <!-- 统计与操作 -->
        <div class="stats-bar" id="statsBar"></div>
        <div style="display:flex; gap:8px; margin-bottom:16px;">
            <button class="btn btn-outline" onclick="exportData()" style="flex:1;">📤 导出JSON</button>
            <button class="btn btn-outline" onclick="triggerImport()" style="flex:1;">📥 导入JSON</button>
            <input type="file" id="importFile" class="import-input" accept=".json" onchange="importData(this)">
        </div>

        <!-- 记录列表 -->
        <div id="recordsList"></div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>📋 记录详情</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
            <div class="form-actions" style="margin-top:20px;">
                <button class="btn btn-danger" id="modalDeleteBtn" onclick="deleteCurrent()">🗑️ 删除</button>
                <button class="btn btn-outline" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 回到顶部/新建 FAB -->
    <button class="fab" onclick="scrollToForm()" title="回到表单">+</button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const STORAGE_KEY = 'chat_archive_records';
        let records = [];
        let currentDetailId = null;

        const categoryMap = {
            A: '创作', B: '技术', C: '学习', D: '决策', E: '日常', F: '混合/其他'
        };

        function init() {
            loadRecords();
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            renderRecords();
            document.getElementById('filterCategory').addEventListener('change', renderRecords);
            document.getElementById('searchInput').addEventListener('input', debounce(renderRecords, 250));
        }

        function loadRecords() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                records = data ? JSON.parse(data) : [];
            } catch (e) {
                records = [];
            }
        }

        function saveRecords() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        function saveRecord() {
            const date = document.getElementById('inputDate').value;
            const category = document.getElementById('inputCategory').value;
            const keywords = document.getElementById('inputKeywords').value.trim();
            const summary = document.getElementById('inputSummary').value.trim();
            const content = document.getElementById('inputContent').value.trim();

            if (!date) { showToast('请填写日期'); return; }
            if (!category) { showToast('请选择分类'); return; }
            if (!summary) { showToast('请填写摘要'); return; }
            if (!content) { showToast('请粘贴对话内容'); return; }

            const record = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                date,
                category,
                keywords: keywords.split(/[,，]/).map(k => k.trim()).filter(k => k),
                summary,
                content,
                createdAt: new Date().toISOString()
            };

            records.unshift(record);
            saveRecords();
            renderRecords();
            clearForm();
            showToast('✅ 保存成功');
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
        }

        function clearForm() {
            document.getElementById('inputCategory').value = '';
            document.getElementById('inputKeywords').value = '';
            document.getElementById('inputSummary').value = '';
            document.getElementById('inputContent').value = '';
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
        }

        function getFilteredRecords() {
            const cat = document.getElementById('filterCategory').value;
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            return records.filter(r => {
                if (cat && r.category !== cat) return false;
                if (q) {
                    const inSummary = r.summary.toLowerCase().includes(q);
                    const inKeywords = r.keywords.some(k => k.toLowerCase().includes(q));
                    const inContent = r.content.toLowerCase().includes(q);
                    if (!inSummary && !inKeywords && !inContent) return false;
                }
                return true;
            });
        }

        function renderRecords() {
            const list = document.getElementById('recordsList');
            const filtered = getFilteredRecords();

            // 统计
            const stats = document.getElementById('statsBar');
            const total = records.length;
            const showing = filtered.length;
            stats.innerHTML = `
                <span class="stat-chip">📦 共 ${total} 条</span>
                <span class="stat-chip">🔍 显示 ${showing} 条</span>
            `;

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <p>${records.length === 0 ? '还没有记录，快去添加第一条吧' : '没有匹配的记录'}</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(r => {
                const preview = r.content.length > 120 ? r.content.slice(0, 120) + '...' : r.content;
                return `
                    <div class="record-card">
                        <div class="record-header">
                            <div class="record-meta">
                                <span class="badge badge-${r.category}">${r.category} · ${categoryMap[r.category]}</span>
                                <span class="record-date">${r.date}</span>
                            </div>
                        </div>
                        <div class="record-summary">${escape
